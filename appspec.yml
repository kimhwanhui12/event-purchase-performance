version: 0.0
os: linux
files:
  - source: /scripts
    destination: /home/ec2-user/deploy/scripts
permissions:
  - object: /home/ec2-user/deploy/scripts
    pattern: "**"
    owner: ec2-user
    group: ec2-user
    mode: 755
hooks:
  ApplicationStop:
    - location: scripts/stop.sh
      timeout: 60
      runas: ec2-user
  ApplicationStart:
    - location: scripts/start.sh
      timeout: 180
      runas: ec2-user
